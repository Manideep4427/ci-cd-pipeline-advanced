
name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Static Application Security Testing (SAST) & Code Quality
  quality-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Custom Linter
        run: npm run lint

      # Scans third-party packages in package.json for known vulnerabilities
      - name: Run Dependency Audit
        run: npm audit --audit-level=high

  # Job 2: Run Automated Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    needs: quality-and-audit
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # Job 3: Build Container, Run Security Vulnerability Scan, and Push
  build-and-ship:
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only deploy / push container images on direct merges/pushes to main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Docker image locally first to prepare it for scanning
      - name: Build Docker Image Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Loads image into local runner's Docker daemon
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline-demo:latest

      # Scan the newly built Docker image with Trivy (industry-standard container security scanner)
      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline-demo:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if vulnerabilities matching severity are found!
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # If the image scan is completely clean, push it securely to Docker Hub
      - name: Push Secure Image to Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-pipeline-demo:${{ github.sha }}